options:
  commandPalette:
    placeholder: Search settings...
    noResults: No settings found
  sidebar:
    settings: Settings
  setAPIKeyWarning:
    please: Please set API Key on
    page: page
  apiProviders:
    title: API Providers
    description: Configure API providers for translation and vocabulary insight. We have 20+ built-in providers and support any OpenAI-compatible API provider.
    addProvider: Add Provider
    badges:
      featureCount: $1 features
    dialog:
      title: Add New Provider
      groups:
        builtInProviders:
          title: Built-in LLM Providers
          description: Built-in large language model providers, no need to fill in most configurations like Base URL
        openaiCompatibleProviders:
          title: OpenAI Compatible Custom Providers
          description: If you can't find your desired AI provider, select Custom Provider to configure any OpenAI-compatible provider, such as Zhipu AI
        pureTranslationProviders:
          title: Pure Translation Providers
          description: Providers focused on translation features without large language model capabilities
    form:
      fields:
        name: Name
        description: Description
        apiKey: API Key
        baseURL: Base URL
        optional: Optional
      duplicate: Duplicate
      delete: Delete
      deleteDialog:
        title: Delete Provider?
        description: This action cannot be undone. Features using this provider will be automatically reassigned to another available provider.
        confirm: Delete
        cancel: Cancel
      atLeastOneLLMProvider: At least one LLM translation provider is required.
      providerInUseCannotDisable: 'Cannot disable "$1" because it is currently used by $2 feature(s).'
      duplicateProviderName: 'Duplicate provider name "$1"'
      defaultProvider:
        translate: Set as default translate provider
      models:
        translate:
          title: Translate Model
          customTitle: Translate Custom Model
          placeholder: Select a model
        fetchModels: Fetch available models
        fetchError: Failed to fetch models
        clickToRetry: Click to retry
        noModels: No models available
        selectModel: Select a model
        apiKeyRequired: Please add API key first
        searchModels: Search models...
        noModelsFound: No models found
      featureProviders: Feature Providers
      advancedOptions: Advanced Options
      providerSettingLabels:
        region: Region
      temperature: Temperature
      temperatureHint: Controls randomness in responses. Lower values (0) are more deterministic, higher values are more creative. Range varies by provider. Leave empty to use provider default.
      headers: Headers
      headersHint: Custom HTTP headers sent when creating the AI provider client. Leave empty to use provider defaults; use {} to disable defaults.
      providerOptions: Provider Options
      providerOptionsHint: Provider-specific options for non-standard API features like thinking/reasoning mode. See the Vercel AI SDK docs or your provider's official documentation for configuration details.
      providerOptionsDocsLink: View Provider Docs
      providerOptionsRecommendationTrigger: View recommended provider options
      providerOptionsRecommendationTitle: Recommended provider options detected
      providerOptionsRecommendationDescription: Review and manually apply the recommended configuration.
      providerOptionsRecommendationApply: Apply
      providerOptionsRecommendationApplied: Applied
      invalidJson: Invalid JSON format
    providers:
      description:
        openai: Provides models like GPT-4o
        deepseek: Recommend to use in China
        openaiCompatible: Third-party and OpenAI API compatible
    apiKey:
      showAPIKey: Show API Key
    howToConfigure: How to configure?
    testConnection:
      button: Test Connection
      testing: Testing...
  general:
    title: General
    appearance:
      title: Appearance
      theme: Theme
      system: System
      light: Light
      dark: Dark
    featureProviders:
      title: Feature Providers
      description: Choose which provider to use for each feature
      features:
        translate: Page Translation
    translationConfig:
      model:
        title: Model
        enterCustomModel: Enter the name of the custom model
    clearCache:
      title: Clear Cache
      description: Clear all translation cache in your browser
      clearing: Clearing...
      dialog:
        title: Clear Cache
        trigger: Clear Cache
        confirm: Confirm
        cancel: Cancel
        description: This operation will clear all translation cache. This action cannot be undone.
  translation:
    title: Translation
    requestQueueConfig:
      title: Translation Rate
      firstOnDescription: Adjust the processing speed of translation requests using the
      lastOnDescription: algorithm
      capacity:
        title: Maximum Burst Request Count
        description: The allowed temporary burst request count determines the maximum number of requests that can be processed concurrently within a short period
      rate:
        title: Average Requests Per Second
        description: Average requests per second, but allows configuring a maximum burst count to temporarily send excess requests
    batchQueueConfig:
      title: Batch Translation
      description: Configure character limits and maximum paragraph count for batch translation (only effective for LLM translation)
      maxCharactersPerBatch:
        title: Maximum Characters
        description: Maximum number of characters allowed per batch request to control the content volume of each translation
      maxItemsPerBatch:
        title: Maximum Paragraph Count
        description: Maximum number of paragraphs for each batch translation to control the content volume of each translation
    personalizedPrompts:
      title: Personalized Prompts
      description: Customizing different types of Prompts allows you to adjust the Prompt type yourself during translation. A Prompt represents the text that the user sends to the LLM.
      addPrompt: Add Prompt
      default: Default
      importSuccess: Import Success
      import: Import
      export: Export
      current: in use
      editPrompt:
        title: Edit Prompt
        name: Name
        systemPrompt: System Prompt
        prompt: Prompt
        promptCellInput:
          input: Text content to translate
          targetLanguage: Target language
          webTitle: Webpage title
          webDescription: Webpage description from page metadata
          webContent: Webpage content (truncated to the first 2000 characters)
          webSummary: Webpage summary (requires AI Smart Context)
        save: Save Changes
        close: Cancel
      deletePrompt:
        title: Delete Prompt
        description: Confirm delete prompt
        confirm: Confirm
        cancel: Cancel
      exportPrompt:
        exportSelected: Export Selected
        cancel: Cancel
    translationStyle:
      title: Translation Display Style
      description: Set any style you want to distinguish translation results from original text
      useCustomStyle: Use Custom CSS Style
      useCustomStyleDescription: Supports any CSS, including fonts, animations, and language-specific styles
      presetStyle: Preset Style
      cssEditor: CSS Editor
      preview: Preview
      stylePreviewLanguage: Language
      stylePreviewDirection: Direction
      stylePreviewTranslatedText: Translated Text
      style:
        default: None
        blur: Blur Effect
        blockquote: Blockquote
        weakened: Weakened
        dashedLine: Dashed Line
        border: Border
        textColor: Text Color
        background: Background
      customCSS:
        editor:
          placeholder: |
            /* Example: Custom style with color and background */
            [data-vibe-reading-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: Save
          savedButton: Saved
          validation:
            validating: Validating...
            valid: CSS is valid
            syntaxError: CSS has syntax errors
            tooLong: CSS is too long
            saved: All changes saved
    translationMode:
      title: Translation Mode
      description: "Choose how the translated text is displayed: bilingual or translation only."
      mode:
        bilingual: Bilingual
        translationOnly: Translation Only
    translateRange:
      title: Translate Range
      description: Select whether to translate only the main content or all content on the page.
      range:
        main: Main Content
        all: All Content
        smart: Smart Content
    smartContentRules:
      title: Smart Content Rules
      description: Configure selector rules for Smart Content page translation.
      customRules: Custom Rules
      help: "Syntax: [!]<domain> <css-selector>. Prefix ! to skip translation, omit to force translate. Domain forms: example.com (root + subdomains), =example.com (exact), *.example.com (subdomains only), * (any host)."
      line: Line
      debug: Debug smart content detection
    pageTranslationShortcut:
      title: Page Translation Shortcut
      description: Customize the shortcut key for translating entire web pages
    floatingTranslateButton:
      title: Floating Translate Button
      description: Show a floating button on webpages to toggle page translation.
      enable: Show floating translate button
      enableDescription: Defaults to on on mobile and off on desktop. Click the button to translate the page; click again to show the original.
    preloadConfig:
      title: Pre-translate Range
      description: Control how much content below the viewport gets pre-translated to save API costs
      margin:
        title: Preload Distance (pixels)
        description: How far below the viewport to start translating content. Lower values save API costs but may cause delays when scrolling.
      threshold:
        title: Visibility Threshold
        description: Percentage of element visibility required to trigger translation (0-1). Higher values delay translation until more of the element is visible.
    smallParagraphFilter:
      title: Small Paragraph Filter
      description: Skip translating text nodes with fewer characters or words than the threshold (0 = disabled)
      minCharacters:
        title: Minimum Characters
        description: Text nodes with fewer characters than this value will not be translated. Character count includes whitespace.
      minWords:
        title: Minimum Words
        description: Text nodes with fewer words than this value will not be translated. Uses Intl.Segmenter for accurate word counting across all languages.
      error: Value must be between $1 and $2
    nodeTranslationHotkey:
      title: Hover or Long-Press Translation Shortcut
      description: Customize the hover modifier key or use long press to translate paragraphs
      enable: Enable
    llmProviderConfigured: LLM provider selected for $1
    llmProviderNotConfigured: No LLM provider selected for $1
    aiContentAware:
      title: AI Smart Context Translation
      description: Enhance translation quality by providing webpage context to the AI
      enable: Enable AI Smart Context Translation
      enableDescription: AI uses webpage summary to improve translation accuracy. Requires LLM provider. Adds latency when starting to translate a page and increases API costs.
  config:
    title: Config
    about:
      title: About
      description: Vibe Reading was born in April 2025
      mission: Vibe Reading aims to expand equal access to high-quality education in the AI era by making learning experiences that feel closer to a real teacher affordable across language learning, medicine, and other knowledge-heavy fields.
    importExport:
      title: Import / Export Config
      description: Back up or restore all your settings. The translation cache is excluded.
      apiKeyWarning: The exported file contains your API keys in plain text. Keep it in a safe place.
      exportButton: Export
      importButton: Import
      exportSuccess: Configuration exported.
      exportFailed: Failed to export configuration.
      importSuccess: Configuration imported.
      importFailed: Failed to import configuration.
      importInvalidFile: Invalid configuration file. Make sure it was exported from this extension.
      dialog:
        title: Replace current configuration?
        description: This will replace all your current settings with the imported configuration. This action cannot be undone.
        confirm: Replace
        cancel: Cancel
    resetConfig:
      title: Reset Config
      description: Reset all config to default value
      dialog:
        title: Reset Config
        trigger: Reset Config
        confirm: Confirm
        cancel: Cancel
        description: This operation will clear all your custom configurations and reset them to default values. Please confirm.
