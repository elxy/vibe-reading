          placeholder: |
            /* Example: Custom style with color and background */
            [data-vibe-reading-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
