        title: 可視性しきい値
        description: 翻訳をトリガーするために必要な要素の可視性の割合（0-1）。高い値は、要素がより多く表示されるまで翻訳を遅らせます。
    smallParagraphFilter:
      title: 短いテキストフィルター
      description: 指定した文字数または単語数より少ないテキストノードの翻訳をスキップします（0 = 無効）
      minCharacters:
        title: 最小文字数
        description: この値より少ない文字数のテキストノードは翻訳されません。文字数には空白が含まれます。
      minWords:
        title: 最小単語数
        description: この値より少ない単語数のテキストノードは翻訳されません。すべての言語で正確な単語カウントのために Intl.Segmenter を使用します。
      error: 値は $1 から $2 の間である必要があります
    nodeTranslationHotkey:
      title: ホバーまたは長押し翻訳ショートカットキー
      description: ホバー翻訳の修飾キーをカスタマイズするか、長押しで段落を翻訳します
