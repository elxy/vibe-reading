      title: Пакетный перевод
      description: Настройте лимиты символов и максимальное количество абзацев для пакетного перевода (действует только для LLM-перевода)
      maxCharactersPerBatch:
        title: Максимум символов
        description: Максимальное количество символов, разрешённое на один пакетный запрос, для контроля объёма содержимого каждого перевода
      maxItemsPerBatch:
        title: Максимум абзацев
        description: Максимальное количество абзацев для каждого пакетного перевода для контроля объёма содержимого каждого перевода
    personalizedPrompts:
      title: Персонализированные промпты
      description: Настройка различных типов промптов позволяет вам самостоятельно изменять тип промпта во время перевода. Промпт — это текст, который пользователь отправляет LLM.
      addPrompt: Добавить промпт
      default: По умолчанию
      importSuccess: Импорт успешен
      import: Импорт
      export: Экспорт
      current: используется
      editPrompt:
        title: Редактировать промпт
        name: Название
        systemPrompt: Системный промпт
        prompt: Промпт
        promptCellInput:
          input: Текстовое содержимое для перевода
          targetLanguage: Целевой язык
          webTitle: Заголовок веб-страницы
          webDescription: Описание веб-страницы из метаданных
          webContent: Содержимое веб-страницы (обрезается до первых 2000 символов)
          webSummary: Резюме веб-страницы (требуется умный контекст ИИ)
        save: Сохранить изменения
        close: Отмена
      deletePrompt:
        title: Удалить промпт
        description: Подтвердить удаление промпта
        confirm: Подтвердить
        cancel: Отмена
      exportPrompt:
        exportSelected: Экспортировать выбранные
        cancel: Отмена
    translationStyle:
      title: Стиль отображения перевода
      description: Установите любой стиль для отличия результатов перевода от оригинального текста
      useCustomStyle: Использовать пользовательский CSS-стиль
      useCustomStyleDescription: Поддерживает любой CSS, включая шрифты, анимации и стили для конкретных языков
      presetStyle: Предустановленный стиль
      cssEditor: CSS-редактор
      preview: Предпросмотр
      stylePreviewLanguage: Язык
      stylePreviewDirection: Направление
      stylePreviewTranslatedText: Переведённый текст
      style:
        default: Нет
        blur: Эффект размытия
        blockquote: Цитата
        weakened: Ослабленный
        dashedLine: Пунктирная линия
        border: Граница
        textColor: Цвет текста
        background: Фон
      customCSS:
        editor:
          placeholder: |
            /* Пример: Пользовательский стиль с цветом и фоном */
            [data-vibe-reading-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: Сохранить
          savedButton: Сохранено
          validation:
            validating: Проверка...
            valid: CSS корректен
            syntaxError: CSS содержит синтаксические ошибки
            tooLong: CSS слишком длинный
            saved: Все изменения сохранены
    translationMode:
      title: Режим перевода
      description: "Выберите способ отображения переведённого текста: двуязычный или только перевод."
      mode:
        bilingual: Двуязычный
        translationOnly: Только перевод
    translateRange:
      title: Диапазон перевода
      description: Выберите, переводить только основное содержимое или всё содержимое на странице.
      range:
        main: Основное содержимое
        all: Всё содержимое
    pageTranslationShortcut:
      title: Горячая клавиша перевода страницы
      description: Настройте горячую клавишу для перевода всей веб-страницы
    preloadConfig:
      title: Диапазон предварительного перевода
      description: Управляйте количеством контента ниже области просмотра, который будет предварительно переведён для экономии затрат на API
      margin:
        title: Расстояние предзагрузки (в пикселях)
        description: Насколько ниже области просмотра начинать перевод контента. Меньшие значения экономят затраты на API, но могут вызвать задержки при прокрутке.
      threshold:
        title: Порог видимости
        description: Процент видимости элемента, необходимый для запуска перевода (0-1). Более высокие значения откладывают перевод до тех пор, пока больше элемента не станет видимым.
    smallParagraphFilter:
      title: Фильтр коротких текстов
      description: Пропускать перевод текстовых узлов с меньшим количеством символов или слов, чем порог (0 = отключено)
      minCharacters:
        title: Минимальное количество символов
        description: Текстовые узлы с меньшим количеством символов не будут переведены. Количество символов включает пробелы.
      minWords:
        title: Минимальное количество слов
        description: Текстовые узлы с меньшим количеством слов не будут переведены. Используется Intl.Segmenter для точного подсчёта слов на всех языках.
      error: Значение должно быть от $1 до $2
    nodeTranslationHotkey:
      title: Горячая клавиша перевода при наведении или долгом нажатии
      description: Настройте клавишу-модификатор для перевода при наведении или используйте долгое нажатие для перевода абзацев
      enable: Включить
    llmProviderConfigured: LLM-провайдер выбран для $1
    llmProviderNotConfigured: LLM-провайдер не выбран для $1
    aiContentAware:
      title: Умный контекстный перевод ИИ
      description: Улучшайте качество перевода, предоставляя ИИ контекст веб-страницы
      enable: Включить умный контекстный перевод ИИ
      enableDescription: ИИ использует резюме веб-страницы для повышения точности перевода. Требуется LLM-провайдер. Добавляет задержку при начале перевода страницы и увеличивает затраты на API.
  config:
    title: Конфигурация
    about:
      title: О приложении
      description: Vibe Reading появился в апреле 2025 года
      mission: Vibe Reading стремится расширить равный доступ к качественному образованию в эпоху ИИ, делая обучение, максимально похожее на занятия с настоящим преподавателем, доступным по цене в языках, медицине и других знанияемких областях.
    importExport:
      title: Импорт / Экспорт настроек
      description: Создайте резервную копию или восстановите все настройки. Кэш переводов не включён.
      apiKeyWarning: Экспортированный файл содержит ваши API-ключи в открытом виде. Храните его в безопасном месте.
      exportButton: Экспорт
      importButton: Импорт
      exportSuccess: Настройки экспортированы.
      exportFailed: Не удалось экспортировать настройки.
      importSuccess: Настройки импортированы.
      importFailed: Не удалось импортировать настройки.
      importInvalidFile: Недопустимый файл настроек. Убедитесь, что он был экспортирован этим расширением.
      dialog:
        title: Заменить текущие настройки?
        description: Это действие заменит все ваши текущие настройки импортированными. Отменить это действие невозможно.
        confirm: Заменить
        cancel: Отмена
    resetConfig:
      title: Сбросить конфигурацию
      description: Сбросить все настройки до значений по умолчанию
      dialog:
        title: Сбросить конфигурацию
        trigger: Сбросить конфигурацию
        confirm: Подтвердить
        cancel: Отмена
        description: Эта операция очистит все ваши пользовательские конфигурации и сбросит их до значений по умолчанию. Пожалуйста, подтвердите.
