    preloadConfig:
      title: 预翻译范围
      description: 控制视口下方多少内容会被预先翻译，以节省 API 费用
      margin:
        title: 预加载距离（像素）
        description: 距离视口多远时开始翻译内容。较小的值可节省 API 费用，但滚动时可能会有延迟。
      threshold:
        title: 可见度阈值
        description: 触发翻译所需的元素可见度百分比（0-1）。较高的值会延迟翻译，直到更多元素可见。
    smallParagraphFilter:
      title: 小段落过滤
      description: 跳过翻译少于指定字符数或词数的文本节点（0 = 禁用）
      minCharacters:
        title: 最小字符数
        description: 少于此字符数的文本节点将不会被翻译。字符计数包含空格。
      minWords:
        title: 最小词数
        description: 少于此词数的文本节点将不会被翻译。使用 Intl.Segmenter 进行跨语言准确分词。
      error: 数值必须在 $1 到 $2 之间
    nodeTranslationHotkey:
      title: 悬停或长按翻译快捷键
      description: 自定义悬停翻译的修饰键，或使用鼠标长按翻译段落
